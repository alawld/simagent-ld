# Lint, typecheck, boundary guards, unit tests, and Sim Agent eval grid (fixed seeds × scenarios × policies).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, guards, tests
        run: npm run verify

      - name: Sim Agent eval grid (scenario thresholds)
        run: npm run sim:eval-grid
